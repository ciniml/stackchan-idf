name: Build and Release Firmware

# Tag-driven release: push `vX.Y.Z` to build the firmware in the official
# ESP-IDF container and attach the artifacts to a GitHub Release. Manual
# dispatch is supported too for smoke-testing the CI without cutting a tag.
#
# The build is fanned out across `BOARD` variants — cores3 (CoreS3 + M5/Takao
# base, 16 MB / Quad PSRAM) and atoms3r (AtomS3R + Atomic ECHO BASE, 8 MB /
# Octal PSRAM) — because the PSRAM mode is locked in by the bootloader at
# link time and cannot be switched at runtime. Each board ships as its own
# ZIP attached to the same Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# softprops/action-gh-release needs to create a Release on the repo. Default
# token scopes are tight under modern GitHub orgs / repo settings, so grant
# `contents: write` here explicitly rather than relying on
# Settings → Actions → Workflow permissions.
permissions:
  contents: write

jobs:
  build:
    name: Build Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel cores3 just because atoms3r failed (and vice-versa); we
      # still want a partial release if one board's build hits a transient
      # issue.
      fail-fast: false
      matrix:
        board: [cores3, atoms3r]
    container:
      # Pinned to v5.4 to match local development. v6.0 dropped the built-in
      # `json` (cJSON) component in favour of an IDF component-manager
      # dependency; our `conversation` component requires it directly and
      # we don't ship a manifest entry for it yet.
      image: espressif/idf:release-v5.4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0  # full history so `git describe --tags` resolves

      - name: Verify git version information
        shell: bash
        run: |
          # Container's git refuses operations in a workspace it doesn't own;
          # mark it safe before any git command.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "=== Git Information ==="
          git describe --tags --abbrev=0 || echo "(no tags found)"
          git rev-parse --short HEAD
          git diff-index --quiet HEAD -- && echo "Working tree clean" || echo "Working tree dirty"
          echo "Current ref: ${GITHUB_REF}"
          echo "Board: ${{ matrix.board }}"

      - name: Install Node.js (avatar DSL compiler)
        shell: bash
        # components/avatar_vm/CMakeLists.txt invokes `node tools/avatar_dsl/cli.mjs`
        # at build time to compile the default avatar face DSL into the
        # bytecode that gets embedded into the firmware. The espressif/idf
        # Debian image does not ship Node, so install it from the distro repo
        # (the compiler is plain ESM that only needs a recent v18+).
        run: |
          apt-get update
          apt-get install -y --no-install-recommends nodejs
          node --version

      - name: Apply M5Unified patches
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/components/M5Unified"
          tools/apply-m5-patches.sh

      - name: Pin PROJECT_VER for the build
        # `tools/apply-m5-patches.sh` modifies the M5Unified submodule's
        # working tree, which makes ESP-IDF's internal
        # `git describe --tags --dirty` (run during cmake) tack a -dirty
        # suffix onto the version stamped into esp_app_desc. Writing the
        # resolved version to version.txt at the project root takes priority
        # over git_describe (see project.cmake's PROJECT_VER resolution
        # order: version.txt > project(VERSION ...) > git describe) and
        # gives us a clean, deterministic version string in CI builds.
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "$VERSION" > version.txt
          echo "version.txt contents: $(cat version.txt)"

      - name: Build firmware (BOARD=${{ matrix.board }})
        shell: bash
        env:
          CI: true
        run: |
          . $IDF_PATH/export.sh
          make set-target BOARD=${{ matrix.board }}
          make build BOARD=${{ matrix.board }}

      - name: Generate single firmware image
        run: |
          python3 script/pack_firmware.py \
            --build-dir build-${{ matrix.board }} \
            --out firmware.bin
          ls -lh firmware.bin

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
          BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"
          echo "Build date: $BUILD_DATE"

      - name: Prepare release artifacts
        shell: bash
        env:
          BUILD_DIR: build-${{ matrix.board }}
          VERSION: ${{ steps.version.outputs.version }}
          BOARD: ${{ matrix.board }}
        run: |
          mkdir -p release
          cp "$BUILD_DIR/bootloader/bootloader.bin"              release/
          cp "$BUILD_DIR/partition_table/partition-table.bin"    release/
          cp "$BUILD_DIR/ota_data_initial.bin"                   release/
          cp "$BUILD_DIR/stackchan_idf.bin"                      release/
          cp firmware.bin release/firmware-${VERSION}-${BOARD}.bin
          cp "$BUILD_DIR/flash_args" release/
          cp README.md release/ 2>/dev/null || true

          echo "=== Firmware Size Information (BOARD=${BOARD}) ==="
          python3 -m esp_idf_size "$BUILD_DIR/stackchan_idf.map" --format=text || true

          ls -lh release/

      - name: Create firmware ZIP
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BOARD: ${{ matrix.board }}
        run: |
          cd release
          zip -r "../firmware-${VERSION}-${BOARD}.zip" .
          cd ..
          ls -lh "firmware-${VERSION}-${BOARD}.zip"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}-${{ matrix.board }}
          path: release/
          retention-days: 90

      - name: Create / update Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          # Each matrix leg uploads its own zip into the same Release; the
          # action merges by tag name and skips duplicates.
          files: firmware-${{ steps.version.outputs.version }}-${{ matrix.board }}.zip
          body: |
            # Stack-chan Firmware ${{ steps.version.outputs.version }}

            Stack-chan firmware (M5Stack CoreS3 / AtomS3R 両対応)。

            ## 対応ボード
            - **CoreS3 + M5/Takao ベース** (`firmware-${{ steps.version.outputs.version }}-cores3.zip`、16 MB flash / Quad PSRAM)
            - **AtomS3R + Atomic ECHO BASE** "アトムニャン" (`firmware-${{ steps.version.outputs.version }}-atoms3r.zip`、8 MB flash / Octal PSRAM)

            PSRAM モードは bootloader レベルで確定するため、ボードごとに別 firmware です。

            ## Features
            - **OpenAI Realtime API / Google Gemini Live API** どちらかでリアルタイム音声会話
            - **BLE 経由の設定 / プロビジョニング** (X25519 + AES-256-GCM 暗号化セッション)
            - **BLE OTA アップデート**(再ビルド不要で次回からはブラウザから直接書き込み)
            - **jtts ボイス カスタマイズ**(声・フレーズを設定画面から変更)
            - **タッチセンサによる barge-in / なでなで応答** (CoreS3 のみ)

            ## Installation

            ### Web Flasher (Chrome / Edge)
            <https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/>
            にアクセスして本リリースを選択し、ボードを選んでから書き込んでください。

            ### コマンドラインから初回書き込み
            1. ボードに合った ZIP (`-cores3` / `-atoms3r`) をダウンロード・展開
            2. esptool で書き込み:
               ```bash
               esptool.py --chip esp32s3 --port /dev/ttyACM0 --baud 460800 write_flash \
                 0x0 firmware-${{ steps.version.outputs.version }}-<board>.bin
               ```

            ### BLE 経由の OTA(既に動いている場合)
            1. <https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/settings.html>
            2. BLE 接続後「ファームウェア更新 (OTA)」を開き、ZIP に同梱の
               `stackchan_idf.bin` を選択 → 書き込み

            ## Build Information
            - **ESP-IDF**: release-v5.4
            - **Target**: ESP32-S3
            - **Build Date**: ${{ steps.version.outputs.build_date }}
            - **Commit**: ${{ github.sha }}

            ## Full Changelog
            https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
